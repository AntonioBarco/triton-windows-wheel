name: Build Triton 2.2.0 Windows wheel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Clonar PyTorch en la tag v2.2.2
        run: |
          git clone --depth 1 --branch v2.2.2 https://github.com/pytorch/pytorch.git

      - name: Instalar dependencias
        run: |
          pip install cmake ninja wheel setuptools

      - name: Compilar wheel de Triton con el script oficial de PyTorch
        run: |
          cd pytorch
          python .github/scripts/build_triton_wheel.py --py-version 3.10
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      - name: Subir el .whl como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: triton-2.2.0-cp310-win
          path: "*.whl"